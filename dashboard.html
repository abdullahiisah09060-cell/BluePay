<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | BluePay</title>
    <link rel="stylesheet" href="global.css">
</head>
<body>
    <div id="app-layout">
        <aside id="sidebar-container"></aside>
        <main id="main-content">
            <header id="topbar-container"></header>
            
            <div class="container" style="padding: var(--space-6) 0;">
                <!-- Balance Card -->
                <div class="card" style="background: linear-gradient(135deg, var(--blue), var(--blue2)); border: none; margin-bottom: var(--space-6);">
                    <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                        <div>
                            <p class="text-micro" style="color: rgba(255,255,255,0.7);">TOTAL BALANCE</p>
                            <h1 id="user-balance" class="text-h1" style="color: white; margin: var(--space-1) 0;">₦0.00</h1>
                        </div>
                        <a href="deposit.html" class="btn btn-gold" style="min-height: 40px; padding: 0 var(--space-4);">+ Deposit</a>
                    </div>
                    <div style="display: flex; gap: var(--space-6); margin-top: var(--space-6); border-top: 1px solid rgba(255,255,255,0.1); padding-top: var(--space-4);">
                        <div>
                            <p class="text-micro" style="color: rgba(255,255,255,0.7); font-size: 10px;">TOTAL INVESTED</p>
                            <p id="total-invested" style="font-weight: 600;">₦0.00</p>
                        </div>
                        <div>
                            <p class="text-micro" style="color: rgba(255,255,255,0.7); font-size: 10px;">TOTAL EARNED</p>
                            <p id="total-earned" style="font-weight: 600; color: var(--gold2);">₦0.00</p>
                        </div>
                    </div>
                </div>

                <!-- Quick Actions -->
                <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--space-3); margin-bottom: var(--space-8);">
                    <a href="invest.html" class="card-interactive flex-center" style="flex-direction: column; padding: var(--space-4); border-radius: var(--radius-s); text-decoration: none;">
                        <span style="font-size: 1.5rem; margin-bottom: 8px;">📈</span>
                        <span class="text-micro" style="font-size: 10px; color: white;">Invest</span>
                    </a>
                    <a href="withdraw.html" class="card-interactive flex-center" style="flex-direction: column; padding: var(--space-4); border-radius: var(--radius-s); text-decoration: none;">
                        <span style="font-size: 1.5rem; margin-bottom: 8px;">💰</span>
                        <span class="text-micro" style="font-size: 10px; color: white;">Withdraw</span>
                    </a>
                    <a href="buy-code.html" class="card-interactive flex-center" style="flex-direction: column; padding: var(--space-4); border-radius: var(--radius-s); text-decoration: none;">
                        <span style="font-size: 1.5rem; margin-bottom: 8px;">🎫</span>
                        <span class="text-micro" style="font-size: 10px; color: white;">Buy Code</span>
                    </a>
                    <a href="referrals.html" class="card-interactive flex-center" style="flex-direction: column; padding: var(--space-4); border-radius: var(--radius-s); text-decoration: none;">
                        <span style="font-size: 1.5rem; margin-bottom: 8px;">🤝</span>
                        <span class="text-micro" style="font-size: 10px; color: white;">Refer</span>
                    </a>
                </div>

                <!-- Active Investments -->
                <h3 class="text-h3" style="margin-bottom: var(--space-4);">Active Investments</h3>
                <div id="active-investments-list" style="display: flex; flex-direction: column; gap: var(--space-3);">
                    <!-- Skeletons will show here -->
                </div>
            </div>
        </main>
        <nav id="mobile-nav-container"></nav>
    </div>

    <script type="module">
        import { requireAuth, db, formatNaira } from './firebase-config.js';
        import { onSnapshot, doc, collection, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { renderSidebar, renderTopbar, renderMobileNav, showToast } from './components.js';

        requireAuth(user => {
            renderSidebar('dashboard');
            renderTopbar(user);
            renderMobileNav('dashboard');

            // Real-time Balance & Stats
            onSnapshot(doc(db, "users", user.uid), (snap) => {
                const data = snap.data();
                document.getElementById('user-balance').innerText = formatNaira(data.balance);
                document.getElementById('total-invested').innerText = formatNaira(data.totalInvested || 0);
                document.getElementById('total-earned').innerText = formatNaira(data.totalEarned || 0);
            });

            // Active Investments List
            const invQuery = query(collection(db, "investments"), where("uid", "==", user.uid), where("status", "==", "active"));
            onSnapshot(invQuery, (snap) => {
                const list = document.getElementById('active-investments-list');
                if(snap.empty) {
                    list.innerHTML = `<div class="card" style="text-align: center; padding: var(--space-10);">
                        <p class="text-body">No active investments. Start growing your wealth today!</p>
                        <a href="invest.html" class="btn btn-outline" style="margin-top: 16px;">View Plans</a>
                    </div>`;
                    return;
                }
                list.innerHTML = '';
                snap.forEach(doc => {
                    const inv = doc.data();
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.style.padding = 'var(--space-4)';
                    card.innerHTML = `
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <div>
                                <p class="text-micro" style="color: var(--gold);">${inv.planName}</p>
                                <p style="font-weight: 700;">${formatNaira(inv.amount)}</p>
                            </div>
                            <button class="btn btn-primary" style="height: 36px; padding: 0 12px; font-size: 12px;" onclick="claimReturn('${doc.id}')">Claim Daily ROI</button>
                        </div>
                    `;
                    list.appendChild(card);
                });
            });
        });
    </script>
</body>
</html>
