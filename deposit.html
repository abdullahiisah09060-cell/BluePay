<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Deposit Funds | BluePay</title>
    <link rel="stylesheet" href="global.css">
    <script src="https://js.paystack.co/v1/inline.js"></script>
</head>
<body>
    <div id="app-layout">
        <main id="main-content" class="container" style="padding-top: var(--space-10);">
            <div class="card" style="max-width: 500px; margin: 0 auto;">
                <h2 class="text-h2" style="margin-bottom: var(--space-2);">Deposit Funds</h2>
                <p class="text-body" style="margin-bottom: var(--space-8);">Securely fund your wallet via Paystack</p>
                
                <div class="form-group">
                    <label class="label">Amount (₦)</label>
                    <input type="number" id="deposit-amount" class="input" placeholder="Enter amount to deposit" min="1000">
                </div>
                
                <div class="card" style="background: var(--bg3); margin-bottom: var(--space-8); padding: var(--space-4);">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                        <span class="text-small">Processing Fee</span>
                        <span class="text-small">₦0.00</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; font-weight: 700;">
                        <span>Total to Pay</span>
                        <span id="total-pay">₦0.00</span>
                    </div>
                </div>

                <button id="pay-btn" class="btn btn-primary" style="width: 100%;">Pay with Paystack</button>
                <a href="dashboard.html" class="btn btn-outline" style="width: 100%; margin-top: 12px; border: none;">Cancel</a>
            </div>
        </main>
    </div>

    <script type="module">
        import { requireAuth, db, createTransaction, updateBalance } from './firebase-config.js';
        import { showToast } from './components.js';
        import { doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const amountInput = document.getElementById('deposit-amount');
        amountInput.oninput = () => {
            document.getElementById('total-pay').innerText = `₦${Number(amountInput.value).toLocaleString()}`;
        };

        requireAuth(user => {
            document.getElementById('pay-btn').onclick = () => {
                const amount = Number(amountInput.value);
                if(amount < 1000) return showToast("Minimum deposit is ₦1,000", "error");

                const handler = PaystackPop.setup({
                    key: 'pk_test_914662bcd8cdc4c28bfbdeb8f48653dbf00c595a',
                    email: user.email,
                    amount: amount * 100, // Kobo
                    currency: "NGN",
                    callback: async (response) => {
                        if(response.status === 'success') {
                            // 1. Log Deposit
                            await setDoc(doc(db, "deposits", response.reference), {
                                uid: user.uid,
                                amount,
                                paystackRef: response.reference,
                                status: "confirmed",
                                createdAt: serverTimestamp()
                            });
                            // 2. Credit Balance
                            await updateBalance(user.uid, amount, 'add');
                            // 3. Create Transaction record
                            await createTransaction({
                                uid: user.uid,
                                type: "deposit",
                                amount,
                                description: "Wallet Funding via Paystack",
                                status: "completed",
                                meta: { ref: response.reference }
                            });
                            showToast("Deposit successful!");
                            setTimeout(() => window.location.href = 'dashboard.html', 2000);
                        }
                    },
                    onClose: () => showToast("Payment cancelled", "error")
                });
                handler.openIframe();
            };
        });
    </script>
</body>
</html>
