<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — BluePay</title>
  <link rel="stylesheet" href="global.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body data-page="forgot">
  <div id="global-loader"><div class="spinner"></div></div>
  
  <div class="auth-container">
    <div class="auth-card reveal">
      <div style="text-align: center; margin-bottom: 30px;">
        <div style="width: 60px; height: 60px; background: rgba(168,85,247,0.1); border-radius: 50%; color: var(--purple); display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;">
          <i class="fa-solid fa-key" style="font-size: 24px;"></i>
        </div>
        <h2 style="margin-bottom: 8px;">Reset Password</h2>
        <p style="color: var(--muted2); font-size: 14px;">We'll send you a link to restore access</p>
      </div>

      <form id="forgot-form">
        <div class="auth-input-group">
          <label>Email Address</label>
          <input type="email" id="forgot-email" placeholder="Enter your registered email" required>
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-bottom: 20px;">Send Reset Link</button>
      </form>

      <div style="text-align: center; font-size: 14px;">
        <a href="login.html" style="color: var(--blue2); font-weight: 700;"><i class="fa-solid fa-arrow-left" style="margin-right: 8px;"></i> Back to Login</a>
      </div>
    </div>
  </div>

  <script src="auth.js" type="module"></script>
</body>
</html>
