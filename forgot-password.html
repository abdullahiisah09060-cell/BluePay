<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password | BluePay</title>
    <link rel="stylesheet" href="global.css">
</head>
<body class="flex-center" style="min-height: 100vh; padding: var(--space-4);">
    <div class="card" style="width: 100%; max-width: 400px;">
        <div id="reset-form-container">
            <h1 class="text-h2" style="margin-bottom: var(--space-2);">Reset Password</h1>
            <p class="text-body" style="margin-bottom: var(--space-8);">Enter your email address and we'll send you a link to reset your password.</p>
            
            <form id="forgot-form">
                <div class="form-group">
                    <label class="label">Email Address</label>
                    <input type="email" id="reset-email" class="input" placeholder="Enter your email address" required>
                </div>
                <button type="submit" id="reset-btn" class="btn btn-primary" style="width: 100%;">Send Reset Link</button>
            </form>
        </div>

        <div id="success-state" style="display: none; text-align: center;">
            <div style="font-size: 3rem; margin-bottom: var(--space-4);">✉️</div>
            <h2 class="text-h2">Email Sent!</h2>
            <p class="text-body" style="margin-bottom: var(--space-8);">If an account exists for that email, you will receive a reset link shortly.</p>
            <a href="login.html" class="btn btn-outline" style="width: 100%;">Back to Login</a>
        </div>
    </div>

    <script type="module">
        import { auth } from './firebase-config.js';
        import { sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { showToast } from './components.js';

        document.getElementById('forgot-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('reset-btn');
            btn.disabled = true;
            try {
                await sendPasswordResetEmail(auth, document.getElementById('reset-email').value);
                document.getElementById('reset-form-container').style.display = 'none';
                document.getElementById('success-state').style.display = 'block';
            } catch(err) {
                showToast(err.message, 'error');
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
