<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Invest | BluePay</title>
    <link rel="stylesheet" href="global.css">
</head>
<body>
    <div id="app-layout">
        <aside id="sidebar-container"></aside>
        <main id="main-content" class="container">
            <header id="topbar-container"></header>
            
            <div style="margin-top: var(--space-6);">
                <h2 class="text-h2">Choose a Plan</h2>
                <p class="text-body" style="margin-bottom: var(--space-8);">Select a tier to start earning daily ROI</p>
                
                <div id="plans-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: var(--space-4);">
                    <!-- Investment Cards injected via JS -->
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { requireAuth, db, formatNaira, updateBalance, createTransaction } from './firebase-config.js';
        import { doc, getDoc, setDoc, serverTimestamp, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { renderSidebar, renderTopbar, showToast, showConfirmModal } from './components.js';

        const PLANS = [
            { id: 'nano', name: 'Nano', roi: 10, days: 3, min: 1000, max: 4999 },
            { id: 'starter', name: 'Starter', roi: 15, days: 7, min: 5000, max: 19999 },
            { id: 'bronze', name: 'Bronze', roi: 20, days: 7, min: 10000, max: 49999 },
            { id: 'silver', name: 'Silver', roi: 28, days: 14, min: 20000, max: 99999 },
            { id: 'gold', name: 'Gold', roi: 35, days: 14, min: 50000, max: 199999 },
            { id: 'diamond', name: 'Diamond', roi: 45, days: 21, min: 100000, max: 499999 },
            { id: 'platinum', name: 'Platinum', roi: 60, days: 30, min: 200000, max: 999999 },
            { id: 'elite', name: 'Elite', roi: 75, days: 30, min: 500000, max: 1999999 },
            { id: 'vip', name: 'VIP', roi: 90, days: 45, min: 1000000, max: 4999999 },
            { id: 'apex', name: 'APEX', roi: 120, days: 60, min: 5000000, max: 99999999 }
        ];

        requireAuth(async user => {
            renderSidebar('invest');
            renderTopbar(user);

            const grid = document.getElementById('plans-grid');
            PLANS.forEach(plan => {
                const card = document.createElement('div');
                card.className = 'card card-interactive';
                card.innerHTML = `
                    <div class="text-micro" style="color: var(--gold);">${plan.roi}% ROI • ${plan.days} Days</div>
                    <h3 class="text-h3" style="margin: 8px 0;">${plan.name} Plan</h3>
                    <p class="text-small" style="color: var(--muted2); margin-bottom: 20px;">Range: ${formatNaira(plan.min)} - ${plan.max > 10000000 ? 'Unlimited' : formatNaira(plan.max)}</p>
                    <div class="form-group">
                        <input type="number" id="amt-${plan.id}" class="input" placeholder="Amount (min ₦${plan.min.toLocaleString()})">
                    </div>
                    <button class="btn btn-gold" style="width: 100%;" onclick="processInvestment('${plan.id}')">Invest Now</button>
                `;
                grid.appendChild(card);
            });

            window.processInvestment = async (planId) => {
                const plan = PLANS.find(p => p.id === planId);
                const amount = Number(document.getElementById(`amt-${planId}`).value);
                
                if(amount < plan.min || (plan.max && amount > plan.max)) {
                    return showToast(`Amount must be between ${formatNaira(plan.min)} and ${formatNaira(plan.max)}`, "error");
                }

                const userData = (await getDoc(doc(db, "users", user.uid))).data();
                if(userData.balance < amount) return showToast("Insufficient balance", "error");

                showConfirmModal("Confirm Investment", `Invest ${formatNaira(amount)} in the ${plan.name} plan for ${plan.days} days?`, async () => {
                    try {
                        const invId = `INV-${Date.now()}`;
                        const profit = (amount * plan.roi) / 100;
                        const maturesAt = new Date();
                        maturesAt.setDate(maturesAt.getDate() + plan.days);

                        await setDoc(doc(db, "investments", invId), {
                            uid: user.uid,
                            planId,
                            planName: plan.name,
                            amount,
                            roiPercent: plan.roi,
                            durationDays: plan.days,
                            expectedReturn: amount + profit,
                            profit,
                            dailyROI: profit / plan.days,
                            status: "active",
                            lastClaimed: null,
                            totalClaimed: 0,
                            claimCount: 0,
                            maturesAt: maturesAt.toISOString(),
                            createdAt: serverTimestamp()
                        });

                        await updateBalance(user.uid, amount, 'sub');
                        // Update total invested stat
                        await setDoc(doc(db, "users", user.uid), { totalInvested: increment(amount) }, { merge: true });

                        await createTransaction({
                            uid: user.uid,
                            type: "investment",
                            amount,
                            description: `${plan.name} Investment Started`,
                            status: "completed",
                            meta: { invId }
                        });

                        showToast("Investment successful!");
                        setTimeout(() => window.location.href = 'dashboard.html', 1500);
                    } catch(e) { showToast(e.message, 'error'); }
                });
            };
        });
    </script>
</body>
</html>
