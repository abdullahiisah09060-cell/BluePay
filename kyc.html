<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KYC Verification | BluePay</title>
    <link rel="stylesheet" href="global.css">
</head>
<body>
    <div id="app-layout">
        <aside id="sidebar-container"></aside>
        <main id="main-content" class="container">
            <header id="topbar-container"></header>
            
            <div class="card" style="max-width: 600px; margin: var(--space-8) auto;">
                <h2 class="text-h2">Identity Verification</h2>
                <p class="text-body" style="margin-bottom: var(--space-8);">Complete KYC to unlock higher withdrawal limits.</p>

                <form id="kyc-form">
                    <div class="form-group">
                        <label class="label">Full Legal Name</label>
                        <input type="text" id="k-name" class="input" required>
                    </div>
                    <div class="grid-2">
                        <div class="form-group">
                            <label class="label">ID Type</label>
                            <select id="k-type" class="input" style="appearance: none;">
                                <option value="nin">NIN Slip</option>
                                <option value="pvc">Voters Card</option>
                                <option value="passport">Intl Passport</option>
                                <option value="license">Drivers License</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="label">ID Number</label>
                            <input type="text" id="k-number" class="input" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="label">Upload ID Card (Front)</label>
                        <div style="border: 2px dashed var(--border); padding: 30px; text-align: center; border-radius: var(--radius-s);">
                            <img id="id-preview" style="max-width: 100%; display: none; margin-bottom: 12px; border-radius: 8px;">
                            <input type="file" id="id-file" accept="image/*" required>
                        </div>
                    </div>

                    <button type="submit" id="submit-btn" class="btn btn-gold" style="width: 100%;">Submit for Review</button>
                </form>
            </div>
        </main>
    </div>

    <script type="module">
        import { requireAuth, db } from './firebase-config.js';
        import { doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { renderSidebar, renderTopbar, showToast } from './components.js';

        requireAuth(user => {
            renderSidebar('profile');
            renderTopbar(user);

            let base64Image = '';
            document.getElementById('id-file').onchange = (e) => {
                const reader = new FileReader();
                reader.onload = () => {
                    base64Image = reader.result;
                    document.getElementById('id-preview').src = base64Image;
                    document.getElementById('id-preview').style.display = 'block';
                };
                reader.readAsDataURL(e.target.files[0]);
            };

            document.getElementById('kyc-form').onsubmit = async (e) => {
                e.preventDefault();
                const btn = document.getElementById('submit-btn');
                btn.disabled = true;
                
                await setDoc(doc(db, "kyc", user.uid), {
                    uid: user.uid,
                    fullName: document.getElementById('k-name').value,
                    idType: document.getElementById('k-type').value,
                    idNumber: document.getElementById('k-number').value,
                    idFrontBase64: base64Image,
                    status: "pending",
                    submittedAt: serverTimestamp()
                });

                showToast("KYC submitted for review!");
                setTimeout(() => window.location.href = 'profile.html', 2000);
            };
        });
    </script>
</body>
</html>
