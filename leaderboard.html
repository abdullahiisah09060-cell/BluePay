<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Leaderboard | BluePay</title>
    <link rel="stylesheet" href="global.css">
</head>
<body>
    <div id="app-layout">
        <aside id="sidebar-container"></aside>
        <main id="main-content" class="container">
            <header id="topbar-container"></header>
            
            <div style="margin-top: var(--space-6); text-align: center;">
                <h1 class="text-h1">Top Investors</h1>
                <p class="text-body" style="margin-bottom: var(--space-8);">Celebrating our most successful community members</p>

                <div id="leaderboard-list" style="max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 12px;">
                    <!-- Top 10 will load here -->
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { renderSidebar, renderTopbar } from './components.js';

        const q = query(collection(db, "users"), orderBy("totalInvested", "desc"), limit(10));
        const snap = await getDocs(q);
        const list = document.getElementById('leaderboard-list');

        snap.forEach((doc, index) => {
            const u = doc.data();
            const isTop3 = index < 3;
            list.innerHTML += `
                <div class="card" style="display: flex; align-items: center; gap: 20px; border-color: ${isTop3 ? 'var(--gold)' : 'var(--border)'};">
                    <div style="font-size: 1.5rem; font-weight: 900; width: 40px; color: ${isTop3 ? 'var(--gold)' : 'var(--muted)'};">#${index+1}</div>
                    <img src="${u.photoBase64 || 'https://ui-avatars.com/api/?name='+u.displayName}" style="width: 48px; height: 48px; border-radius: 50%;">
                    <div style="text-align: left; flex: 1;">
                        <p style="font-weight: 700;">${u.displayName}</p>
                        <p class="text-micro" style="font-size: 10px;">PLATINUM MEMBER</p>
                    </div>
                    <div style="font-weight: 800; color: var(--gold);">★ Active</div>
                </div>
            `;
        });
    </script>
</body>
</html>
