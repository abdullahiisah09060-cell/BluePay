<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — BluePay</title>
  <link rel="stylesheet" href="global.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body data-page="login">
  <div id="global-loader"><div class="spinner"></div></div>
  
  <div class="auth-container">
    <div class="auth-card reveal">
      <div style="text-align: center; margin-bottom: 30px;">
        <a href="index.html" class="flex" style="justify-content: center; gap: 12px; margin-bottom: 24px;">
          <div style="width: 40px; height: 40px; background: var(--blue); border-radius: 10px; display: flex; align-items: center; justify-content: center;">
            <i class="fa-solid fa-b" style="color: white; font-size: 20px;"></i>
          </div>
          <span style="font-size: 22px; font-weight: 900; letter-spacing: -1px;">BluePay</span>
        </a>
        <h2 style="margin-bottom: 8px;">Welcome Back</h2>
        <p style="color: var(--muted2); font-size: 14px;">Access your portfolio and earnings</p>
      </div>

      <button id="google-login" class="btn btn-outline" style="width: 100%; margin-bottom: 24px; gap: 12px;">
        <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_Logo.svg" width="18" alt="Google">
        Sign In with Google
      </button>

      <div style="display: flex; align-items: center; margin-bottom: 24px; gap: 10px;">
        <div style="flex: 1; height: 1px; background: var(--border);"></div>
        <span style="font-size: 12px; color: var(--muted2); font-weight: 600;">OR EMAIL</span>
        <div style="flex: 1; height: 1px; background: var(--border);"></div>
      </div>

      <form id="login-form">
        <div class="auth-input-group">
          <label>Email Address</label>
          <input type="email" id="login-email" placeholder="name@example.com" required>
        </div>
        <div class="auth-input-group">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="Enter your password" required>
          <i class="fa-solid fa-eye-slash eye-toggle" style="position: absolute; right: 16px; top: 42px; color: var(--muted2); cursor: pointer;"></i>
        </div>
        
        <div style="text-align: right; margin-bottom: 30px;">
          <a href="forgot-password.html" style="font-size: 13px; color: var(--blue2); font-weight: 600;">Forgot Password?</a>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In to Dashboard</button>
      </form>

      <div style="text-align: center; margin-top: 30px; font-size: 14px; color: var(--muted2);">
        Don't have an account? <a href="register.html" style="color: var(--blue2); font-weight: 700;">Get Started</a>
      </div>
    </div>
  </div>

  <script src="auth.js" type="module"></script>
</body>
</html>
