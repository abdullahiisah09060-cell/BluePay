<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — BluePay</title>
  <link rel="stylesheet" href="global.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    .auth-wrapper { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .auth-card { width: 100%; max-width: 400px; background: var(--bg2); border-radius: var(--radius); padding: 30px; border: 1px solid var(--border); }
  </style>
</head>
<body data-page="login">
  <div id="global-loader"><div class="spinner"></div></div>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div style="text-align: center; margin-bottom: 25px;">
        <h2 style="margin-bottom: 5px;">Welcome Back</h2>
        <p style="color: var(--muted2); font-size: 14px;">Log in to your investment portal</p>
      </div>
      <button id="google-login" class="btn btn-outline" style="width: 100%; margin-bottom: 20px; gap: 10px;">
        <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_Logo.svg" width="18"> Google
      </button>
      <form id="login-form">
        <div class="auth-input-group">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="john@example.com" required>
        </div>
        <div class="auth-input-group">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="••••••••" required>
        </div>
        <div style="text-align: right; margin-bottom: 20px;">
          <a href="forgot-password.html" style="font-size: 13px; color: var(--blue2); font-weight: 600;">Forgot Password?</a>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
      </form>
      <p style="text-align: center; margin-top: 20px; font-size: 14px; color: var(--muted2);">New here? <a href="register.html" style="color: var(--blue2); font-weight: 700;">Get Started</a></p>
    </div>
  </div>
  <script src="auth.js" type="module"></script>
</body>
</html>
