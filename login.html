<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | BluePay</title>
    <link rel="stylesheet" href="global.css">
</head>
<body class="flex-center" style="min-height: 100vh; padding: var(--space-4);">
    <div class="card" style="width: 100%; max-width: 400px;">
        <div style="text-align: center; margin-bottom: var(--space-8);">
            <div class="text-h3" style="color: var(--blue3); margin-bottom: var(--space-2);">BLUEPAY</div>
            <h1 class="text-h2">Welcome Back</h1>
            <p class="text-body">Login to manage your investments</p>
        </div>

        <div id="google-btn-container"></div>

        <form id="login-form">
            <div class="form-group">
                <label class="label">Email Address</label>
                <input type="email" id="login-email" class="input" placeholder="Enter your email address" required>
            </div>
            <div class="form-group">
                <div style="display: flex; justify-content: space-between;">
                    <label class="label">Password</label>
                    <a href="forgot-password.html" class="text-small" style="color: var(--blue3); text-decoration: none;">Forgot?</a>
                </div>
                <input type="password" id="login-pass" class="input" placeholder="Enter your password" required>
            </div>
            <button type="submit" id="login-btn" class="btn btn-primary" style="width: 100%;">Login to BluePay</button>
        </form>

        <p class="text-small" style="text-align: center; margin-top: 24px; color: var(--muted2);">
            Don't have an account? <a href="register.html" style="color: var(--gold); font-weight: 600; text-decoration: none;">Register</a>
        </p>
    </div>

    <script type="module">
        import { auth, handleGoogleSignIn } from './auth.js';
        import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { renderGoogleButton, showToast } from './components.js';

        renderGoogleButton('google-btn-container').onclick = async () => {
            try { await handleGoogleSignIn(); window.location.href = 'dashboard.html'; }
            catch(e) { showToast(e.message, 'error'); }
        };

        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            btn.disabled = true; btn.innerText = "Verifying...";
            try {
                await signInWithEmailAndPassword(auth, document.getElementById('login-email').value, document.getElementById('login-pass').value);
                window.location.href = 'dashboard.html';
            } catch(err) {
                showToast("Invalid email or password", "error");
                btn.disabled = false; btn.innerText = "Login to BluePay";
            }
        };
    </script>
</body>
</html>
