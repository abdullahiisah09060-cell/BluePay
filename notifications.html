<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Notifications | BluePay</title>
    <link rel="stylesheet" href="global.css">
</head>
<body>
    <div id="app-layout">
        <aside id="sidebar-container"></aside>
        <main id="main-content" class="container">
            <header id="topbar-container"></header>
            
            <div style="max-width: 700px; margin: var(--space-6) auto;">
                <h2 class="text-h2" style="margin-bottom: var(--space-6);">Your Notifications</h2>
                <div id="notif-list" style="display: flex; flex-direction: column; gap: 12px;">
                    <!-- List of alerts -->
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { requireAuth, db } from './firebase-config.js';
        import { collection, query, where, orderBy, onSnapshot, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { renderSidebar, renderTopbar } from './components.js';

        requireAuth(user => {
            renderSidebar('dashboard');
            renderTopbar(user);

            const q = query(collection(db, "notifications"), where("uid", "==", user.uid), orderBy("createdAt", "desc"));
            onSnapshot(q, (snap) => {
                const list = document.getElementById('notif-list');
                list.innerHTML = '';
                snap.forEach(d => {
                    const n = d.data();
                    const item = document.createElement('div');
                    item.className = 'card';
                    item.style.background = n.read ? 'var(--bg2)' : 'var(--bg3)';
                    item.style.borderLeft = n.read ? '1px solid var(--border)' : '4px solid var(--blue)';
                    item.innerHTML = `
                        <p style="font-weight: 700; margin-bottom: 4px;">${n.title}</p>
                        <p class="text-body" style="font-size: 0.9rem;">${n.message}</p>
                        <p class="text-micro" style="margin-top: 10px; font-size: 10px;">${new Date(n.createdAt?.seconds * 1000).toLocaleString()}</p>
                    `;
                    item.onclick = () => updateDoc(doc(db, "notifications", d.id), { read: true });
                    list.appendChild(item);
                });
            });
        });
    </script>
</body>
</html>
