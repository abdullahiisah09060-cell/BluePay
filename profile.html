<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Profile | BluePay</title>
    <link rel="stylesheet" href="global.css">
</head>
<body>
    <div id="app-layout">
        <aside id="sidebar-container"></aside>
        <main id="main-content" class="container">
            <header id="topbar-container"></header>
            
            <div style="max-width: 600px; margin: var(--space-8) auto;">
                <div class="card" style="text-align: center; margin-bottom: var(--space-6);">
                    <div style="position: relative; width: 100px; height: 100px; margin: 0 auto var(--space-4);">
                        <img id="avatar-preview" src="https://ui-avatars.com/api/?name=User&background=1a56db&color=fff" style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid var(--blue);">
                        <label for="avatar-input" style="position: absolute; bottom: 0; right: 0; background: var(--gold); width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid var(--bg2);">
                            📸
                        </label>
                        <input type="file" id="avatar-input" hidden accept="image/*">
                    </div>
                    <h2 id="profile-name" class="text-h2">Loading...</h2>
                    <p id="profile-email" class="text-body"></p>
                </div>

                <div class="card">
                    <h3 class="text-h3" style="margin-bottom: var(--space-6);">Account Details</h3>
                    <form id="profile-form">
                        <div class="form-group">
                            <label class="label">Full Name</label>
                            <input type="text" id="p-name" class="input">
                        </div>
                        <div class="form-group">
                            <label class="label">Phone Number</label>
                            <input type="tel" id="p-phone" class="input">
                        </div>
                        <button type="submit" id="save-btn" class="btn btn-primary" style="width: 100%;">Update Profile</button>
                    </form>
                </div>

                <button class="btn btn-outline" style="width: 100%; margin-top: 24px; color: var(--red); border-color: rgba(239, 68, 68, 0.2);" onclick="logout()">Logout Account</button>
            </div>
        </main>
    </div>

    <script type="module">
        import { requireAuth, db } from './firebase-config.js';
        import { doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { renderSidebar, renderTopbar, showToast } from './components.js';

        requireAuth(async user => {
            renderSidebar('profile');
            renderTopbar(user);

            const userRef = doc(db, "users", user.uid);
            const snap = await getDoc(userRef);
            const data = snap.data();

            document.getElementById('profile-name').innerText = data.displayName;
            document.getElementById('profile-email').innerText = data.email;
            document.getElementById('p-name').value = data.displayName;
            document.getElementById('p-phone').value = data.phone || '';
            if(data.photoBase64) document.getElementById('avatar-preview').src = data.photoBase64;

            // Handle Avatar Upload
            document.getElementById('avatar-input').onchange = (e) => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onloadend = async () => {
                    const base64 = reader.result;
                    document.getElementById('avatar-preview').src = base64;
                    await updateDoc(userRef, { photoBase64: base64 });
                    showToast("Avatar updated!");
                };
                reader.readAsDataURL(file);
            };

            document.getElementById('profile-form').onsubmit = async (e) => {
                e.preventDefault();
                const btn = document.getElementById('save-btn');
                btn.disabled = true;
                await updateDoc(userRef, {
                    displayName: document.getElementById('p-name').value,
                    phone: document.getElementById('p-phone').value
                });
                showToast("Profile updated successfully!");
                btn.disabled = false;
            };
        });
    </script>
</body>
</html>
