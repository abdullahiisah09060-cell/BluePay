<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Referrals | BluePay</title>
    <link rel="stylesheet" href="global.css">
</head>
<body>
    <div id="app-layout">
        <aside id="sidebar-container"></aside>
        <main id="main-content" class="container">
            <header id="topbar-container"></header>
            
            <div class="grid-2" style="margin-top: var(--space-6);">
                <div class="card">
                    <h3 class="text-h3" style="margin-bottom: var(--space-2);">Your Referral Link</h3>
                    <p class="text-small" style="margin-bottom: var(--space-6);">Invite friends and earn 5% of their first deposit.</p>
                    <div style="display: flex; gap: 8px;">
                        <input type="text" id="ref-link" class="input" readonly style="flex: 1; font-family: monospace; font-size: 0.8rem;">
                        <button class="btn btn-primary" onclick="copyRef()">Copy</button>
                    </div>
                </div>
                <div class="card">
                    <h3 class="text-h3">Earnings History</h3>
                    <canvas id="ref-chart" style="width: 100%; height: 120px; margin-top: 10px;"></canvas>
                </div>
            </div>

            <div class="card" style="margin-top: var(--space-6);">
                <h3 class="text-h3" style="margin-bottom: var(--space-6);">My Referrals</h3>
                <div id="ref-list">
                    <!-- List of referred users -->
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { requireAuth, db } from './firebase-config.js';
        import { collection, query, where, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { renderSidebar, renderTopbar, showToast } from './components.js';
        import { renderMiniLineChart } from './chart-utils.js';

        requireAuth(async user => {
            renderSidebar('referrals');
            renderTopbar(user);

            const userSnap = await getDoc(doc(db, "users", user.uid));
            const data = userSnap.data();
            document.getElementById('ref-link').value = `https://bluepay.ng/register.html?ref=${data.referralCode}`;

            // Mock chart data (in production, fetch real monthly bonus sum)
            renderMiniLineChart(document.getElementById('ref-chart'), [0, 500, 1200, 800, 2500, 3100]);

            const q = query(collection(db, "users"), where("referredBy", "==", data.referralCode));
            const snap = await getDocs(q);
            const list = document.getElementById('ref-list');
            
            if(snap.empty) {
                list.innerHTML = `<p class="text-body" style="text-align: center; padding: 20px;">No referrals yet. Share your link to start earning!</p>`;
            } else {
                snap.forEach(d => {
                    const u = d.data();
                    list.innerHTML += `
                        <div style="display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border);">
                            <div>
                                <p style="font-weight: 600;">${u.displayName}</p>
                                <p class="text-micro">${new Date(u.createdAt.seconds * 1000).toLocaleDateString()}</p>
                            </div>
                            <div style="color: var(--green); font-weight: 700;">Active</div>
                        </div>
                    `;
                });
            }
        });

        window.copyRef = () => {
            document.getElementById('ref-link').select();
            document.execCommand('copy');
            showToast("Referral link copied!");
        };
    </script>
</body>
</html>
