<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Account | BluePay</title>
    <link rel="stylesheet" href="global.css">
</head>
<body class="flex-center" style="min-height: 100vh; padding: var(--space-4);">
    <div class="card" style="width: 100%; max-width: 440px;">
        <div style="text-align: center; margin-bottom: var(--space-8);">
            <div class="text-h3" style="color: var(--blue3); margin-bottom: var(--space-2);">BLUEPAY</div>
            <h1 class="text-h2">Get Started</h1>
            <p class="text-body">Create your secure investment account</p>
        </div>

        <div id="google-btn-container"></div>
        <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 20px;">
            <div style="flex: 1; height: 1px; background: var(--border);"></div>
            <span class="text-micro" style="color: var(--muted);">OR EMAIL</span>
            <div style="flex: 1; height: 1px; background: var(--border);"></div>
        </div>

        <form id="register-form">
            <div id="section-1">
                <div class="form-group">
                    <label class="label">Full Name</label>
                    <input type="text" id="reg-name" class="input" placeholder="Enter your full name" required>
                </div>
                <div class="form-group">
                    <label class="label">Email Address</label>
                    <input type="email" id="reg-email" class="input" placeholder="Enter your email address" required>
                </div>
                <div class="form-group">
                    <label class="label">Phone Number</label>
                    <input type="tel" id="reg-phone" class="input" placeholder="Enter your phone number" required>
                </div>
                <button type="button" class="btn btn-primary" style="width: 100%;" onclick="document.getElementById('section-1').style.display='none'; document.getElementById('section-2').style.display='block';">Next Step</button>
            </div>

            <div id="section-2" style="display: none;">
                <div class="form-group">
                    <label class="label">Create Password</label>
                    <input type="password" id="reg-pass" class="input" placeholder="Create a password" required>
                </div>
                <div class="form-group">
                    <label class="label">Confirm Password</label>
                    <input type="password" id="reg-confirm" class="input" placeholder="Confirm your password" required>
                </div>
                <div style="margin-bottom: var(--space-5);">
                    <a href="#" class="text-small" style="color: var(--blue3); text-decoration: none;" onclick="this.nextElementSibling.style.display='block'; this.remove(); return false;">Have a referral code?</a>
                    <input type="text" id="reg-ref" class="input" style="display: none; margin-top: 10px;" placeholder="Enter referral code">
                </div>
                <button type="submit" id="submit-btn" class="btn btn-gold" style="width: 100%;">Create My Account</button>
                <button type="button" class="btn btn-outline" style="width: 100%; margin-top: 12px; border: none;" onclick="document.getElementById('section-2').style.display='none'; document.getElementById('section-1').style.display='block';">Back</button>
            </div>
        </form>

        <p class="text-small" style="text-align: center; margin-top: 24px; color: var(--muted2);">
            Already have an account? <a href="login.html" style="color: var(--blue3); font-weight: 600; text-decoration: none;">Login</a>
        </p>
    </div>

    <script type="module">
        import { handleRegistration, handleGoogleSignIn } from './auth.js';
        import { renderGoogleButton, showToast } from './components.js';

        renderGoogleButton('google-btn-container').onclick = async () => {
            try { await handleGoogleSignIn(); window.location.href = 'welcome.html'; }
            catch(e) { showToast(e.message, 'error'); }
        };

        document.getElementById('register-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const pass = document.getElementById('reg-pass').value;
            if(pass !== document.getElementById('reg-confirm').value) return showToast("Passwords do not match", "error");
            
            btn.disabled = true; btn.innerText = "Creating...";
            try {
                await handleRegistration(
                    document.getElementById('reg-email').value,
                    pass,
                    document.getElementById('reg-name').value,
                    document.getElementById('reg-phone').value,
                    document.getElementById('reg-ref').value
                );
                window.location.href = 'verify.html';
            } catch(err) {
                showToast(err.message, 'error');
                btn.disabled = false; btn.innerText = "Create My Account";
            }
        };
    </script>
</body>
</html>
