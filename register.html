<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — BluePay</title>
  <link rel="stylesheet" href="global.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    .auth-wrapper { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .auth-card { width: 100%; max-width: 450px; background: var(--bg2); border-radius: var(--radius); padding: 30px; border: 1px solid var(--border); }
    @media (max-width: 480px) { .auth-card { padding: 20px; border: none; background: transparent; } }
  </style>
</head>
<body data-page="register">
  <div id="global-loader"><div class="spinner"></div></div>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div style="text-align: center; margin-bottom: 25px;">
        <h2 style="margin-bottom: 10px;">Create Account</h2>
        <p style="color: var(--green); font-size: 14px; font-weight: 700;">Claim your ₦200,000 bonus</p>
      </div>
      <button id="google-reg" class="btn btn-outline" style="width: 100%; margin-bottom: 20px; gap: 10px;">
        <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_Logo.svg" width="18"> Google
      </button>
      <form id="reg-form">
        <div class="auth-input-group">
          <label>Full Name</label>
          <input type="text" id="reg-name" placeholder="John Doe" required>
        </div>
        <div class="auth-input-group">
          <label>Email</label>
          <input type="email" id="reg-email" placeholder="john@example.com" required>
        </div>
        <div class="auth-input-group">
          <label>Phone</label>
          <input type="tel" id="reg-phone" placeholder="080 1234 5678" required>
        </div>
        <div class="auth-input-group">
          <label>Password</label>
          <input type="password" id="reg-password" placeholder="••••••••" required>
          <div class="strength-meter"><div id="strength-bar" class="strength-bar"></div></div>
          <p id="strength-text" style="font-size: 11px; margin-top: 4px;"></p>
        </div>
        <div class="auth-input-group">
          <label>Confirm Password</label>
          <input type="password" id="reg-confirm" placeholder="••••••••" required>
        </div>
        <div class="auth-input-group">
          <label>Referral Code (Optional)</label>
          <input type="text" id="reg-referral">
        </div>
        <label style="display: flex; gap: 10px; font-size: 12px; margin-bottom: 20px; color: var(--muted2);">
          <input type="checkbox" id="reg-terms" required> I agree to the terms.
        </label>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Get ₦200k Bonus</button>
      </form>
      <p style="text-align: center; margin-top: 20px; font-size: 14px; color: var(--muted2);">Already have an account? <a href="login.html" style="color: var(--blue2); font-weight: 700;">Login</a></p>
    </div>
  </div>
  <script src="auth.js" type="module"></script>
</body>
</html>
