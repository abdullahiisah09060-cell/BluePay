<!-- register.html -->
<div class="auth-container reveal">
    <div class="auth-card">
        <h2 style="margin-bottom: var(--space-2);">Join BluePay</h2>
        <p style="margin-bottom: var(--space-8);">Secure your financial future today.</p>

        <!-- OFFICIAL GOOGLE BUTTON -->
        <button class="google-btn" id="googleBtn">
            <svg width="20" height="20" viewBox="0 0 48 48">
                <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3c-1.6 4.7-6.1 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 8 3l5.7-5.7C34.6 6.1 29.6 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.7-.4-3.5z"/>
                <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 16 18.9 13 24 13c3.1 0 5.8 1.1 8 3l5.7-5.7C34.6 6.1 29.6 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/>
                <path fill="#4CAF50" d="M24 44c5.5 0 10.5-2.1 14.2-5.6l-6.6-5.4C29.6 34.9 27 36 24 36c-5.2 0-9.6-3.3-11.3-8l-6.6 5.1C9.5 39.6 16.2 44 24 44z"/>
                <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.2 4.3-4.1 5.7l6.6 5.4C41.6 35.6 44 30.2 44 24c0-1.3-.1-2.7-.4-3.5z"/>
            </svg>
            <span>Continue with Google</span>
        </button>

        <div class="or-divider">OR</div>

        <form id="regForm">
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="name" placeholder="Enter your full name" required>
            </div>
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="Enter your email address" required>
            </div>
            <div class="input-group">
                <label>Create Password</label>
                <input type="password" id="password" placeholder="Create a strong password" required>
                <div id="pwdStrength" class="strength-meter"></div>
            </div>
            <button type="submit" class="btn-primary" style="width:100%; height:48px; margin-top:20px;">Create My Account</button>
        </form>
        <p style="margin-top:20px; text-align:center;">Already have an account? <a href="login.html" class="gold-text">Login</a></p>
    </div>
</div>

<script type="module">
    import { auth, googleProvider, syncUserAccount } from './firebase-config.js';
    import { signInWithPopup, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { toast } from './app.js';

    // Google Sign-In with Prevention Logic
    document.getElementById("googleBtn").onclick = async () => {
        try {
            const res = await signInWithPopup(auth, googleProvider);
            await syncUserAccount(res.user);
            toast("Success! Welcome to BluePay", "success");
            window.location.href = "welcome.html";
        } catch (e) {
            toast(e.message, "error");
        }
    };

    // Email Registration
    document.getElementById("regForm").onsubmit = async (e) => {
        e.preventDefault();
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const name = document.getElementById("name").value;

        try {
            const res = await createUserWithEmailAndPassword(auth, email, password);
            await updateProfile(res.user, { displayName: name });
            await syncUserAccount(res.user, { displayName: name });
            window.location.href = "verify.html";
        } catch (e) {
            toast(e.message, "error");
        }
    };
</script>
