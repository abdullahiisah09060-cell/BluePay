<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Support Chat | BluePay</title>
    <link rel="stylesheet" href="global.css">
    <style>
        #chat-window { height: calc(100vh - 250px); overflow-y: auto; display: flex; flex-direction: column; gap: 12px; padding: 20px; }
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 16px; font-size: 0.95rem; line-height: 1.4; }
        .msg-user { align-self: flex-end; background: var(--blue); color: white; border-bottom-right-radius: 4px; }
        .msg-agent { align-self: flex-start; background: var(--bg3); border-bottom-left-radius: 4px; }
    </style>
</head>
<body>
    <div id="app-layout">
        <aside id="sidebar-container"></aside>
        <main id="main-content" class="container">
            <header id="topbar-container"></header>
            
            <div class="card" style="padding: 0; margin-top: var(--space-4); display: flex; flex-direction: column;">
                <div style="padding: 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px;">
                    <div style="width: 10px; height: 10px; background: var(--green); border-radius: 50%;"></div>
                    <div>
                        <p style="font-weight: 700;">Live Support</p>
                        <p class="text-micro" style="font-size: 10px;">Typically replies in minutes</p>
                    </div>
                </div>

                <div id="chat-window">
                    <!-- Messages appear here -->
                </div>

                <div style="padding: 16px; background: var(--bg3); display: flex; gap: 12px;">
                    <input type="text" id="msg-input" class="input" placeholder="Type your message..." style="flex: 1;">
                    <button id="send-btn" class="btn btn-primary">Send</button>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { requireAuth, db } from './firebase-config.js';
        import { collection, query, orderBy, onSnapshot, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { renderSidebar, renderTopbar } from './components.js';

        requireAuth(user => {
            renderSidebar('support');
            renderTopbar(user);

            const threadId = user.uid; // One thread per user
            const chatRef = collection(db, "support", threadId, "messages");
            const q = query(chatRef, orderBy("createdAt", "asc"));

            onSnapshot(q, (snap) => {
                const win = document.getElementById('chat-window');
                win.innerHTML = '';
                snap.forEach(doc => {
                    const m = doc.data();
                    const div = document.createElement('div');
                    div.className = `msg ${m.isAdmin ? 'msg-agent' : 'msg-user'}`;
                    div.innerText = m.message;
                    win.appendChild(div);
                });
                win.scrollTop = win.scrollHeight;
            });

            const send = async () => {
                const val = document.getElementById('msg-input').value.trim();
                if(!val) return;
                document.getElementById('msg-input').value = '';
                await addDoc(chatRef, {
                    senderUid: user.uid,
                    message: val,
                    isAdmin: false,
                    createdAt: serverTimestamp()
                });
            };

            document.getElementById('send-btn').onclick = send;
            document.getElementById('msg-input').onkeypress = (e) => { if(e.key === 'Enter') send(); };
        });
    </script>
</body>
</html>
