<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Transactions | BluePay</title>
    <link rel="stylesheet" href="global.css">
    <style>
        @media (max-width: 640px) {
            thead { display: none; }
            tr { display: block; background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 12px; padding: 12px; }
            td { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); }
            td:last-child { border: none; }
            td::before { content: attr(data-label); font-weight: 700; font-size: 0.75rem; color: var(--muted); }
        }
    </style>
</head>
<body>
    <div id="app-layout">
        <aside id="sidebar-container"></aside>
        <main id="main-content" class="container">
            <header id="topbar-container"></header>
            
            <div style="margin-top: var(--space-6);">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-6);">
                    <h2 class="text-h2">Transaction History</h2>
                    <input type="text" id="tx-search" class="input" placeholder="Search transactions..." style="max-width: 250px; height: 40px;">
                </div>

                <div class="card" style="padding: 0; overflow: hidden;">
                    <table style="width: 100%; border-collapse: collapse; text-align: left;">
                        <thead style="background: var(--bg3);">
                            <tr>
                                <th style="padding: 16px;">Type</th>
                                <th style="padding: 16px;">Amount</th>
                                <th style="padding: 16px;">Status</th>
                                <th style="padding: 16px;">Date</th>
                            </tr>
                        </thead>
                        <tbody id="tx-table-body">
                            <!-- Transactions injected here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { requireAuth, db, formatNaira } from './firebase-config.js';
        import { collection, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { renderSidebar, renderTopbar } from './components.js';

        requireAuth(async user => {
            renderSidebar('transactions');
            renderTopbar(user);

            const q = query(collection(db, "transactions"), where("uid", "==", user.uid), orderBy("createdAt", "desc"));
            const snap = await getDocs(q);
            const body = document.getElementById('tx-table-body');

            const render = (docs) => {
                body.innerHTML = '';
                docs.forEach(doc => {
                    const tx = doc.data();
                    const statusColor = tx.status === 'completed' ? 'var(--green)' : tx.status === 'pending' ? 'var(--orange)' : 'var(--red)';
                    body.innerHTML += `
                        <tr>
                            <td data-label="Type" style="padding: 16px;">
                                <div style="font-weight: 600;">${tx.type.toUpperCase()}</div>
                                <div class="text-micro" style="font-size: 10px;">${tx.description}</div>
                            </td>
                            <td data-label="Amount" style="padding: 16px; font-weight: 700;">${formatNaira(tx.amount)}</td>
                            <td data-label="Status" style="padding: 16px;">
                                <span style="color: ${statusColor}; font-size: 12px; font-weight: 700;">● ${tx.status.toUpperCase()}</span>
                            </td>
                            <td data-label="Date" style="padding: 16px; font-size: 13px; color: var(--muted2);">${new Date(tx.createdAt?.seconds * 1000).toLocaleDateString()}</td>
                        </tr>
                    `;
                });
            };

            render(snap.docs);

            // Debounced Search
            let timer;
            document.getElementById('tx-search').oninput = (e) => {
                clearTimeout(timer);
                timer = setTimeout(() => {
                    const term = e.target.value.toLowerCase();
                    const filtered = snap.docs.filter(d => d.data().description.toLowerCase().includes(term) || d.data().type.toLowerCase().includes(term));
                    render(filtered);
                }, 300);
            };
        });
    </script>
</body>
</html>
