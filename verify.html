<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Verify Email | BluePay</title>
    <link rel="stylesheet" href="global.css">
</head>
<body class="flex-center" style="min-height: 100vh; padding: var(--space-4);">
    <div class="card" style="width: 100%; max-width: 400px; text-align: center;">
        <div style="font-size: 3rem; margin-bottom: var(--space-4);">📧</div>
        <h1 class="text-h2" style="margin-bottom: var(--space-2);">Check your email</h1>
        <p class="text-body" style="margin-bottom: var(--space-8);">We've sent a verification link to your email. Click the link to activate your account.</p>
        
        <div class="skeleton" style="height: 4px; border-radius: 2px; margin-bottom: 24px;"></div>
        
        <button id="resend-btn" class="btn btn-outline" style="width: 100%;">Resend Email (60s)</button>
        <p class="text-small" style="margin-top: 20px; color: var(--muted);">Verifying automatically...</p>
    </div>

    <script type="module">
        import { auth } from './firebase-config.js';
        import { sendEmailVerification } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { showToast } from './components.js';

        let cooldown = 60;
        const resendBtn = document.getElementById('resend-btn');
        
        const timer = setInterval(() => {
            if(cooldown > 0) {
                cooldown--;
                resendBtn.innerText = `Resend Email (${cooldown}s)`;
                resendBtn.disabled = true;
            } else {
                resendBtn.innerText = "Resend Email";
                resendBtn.disabled = false;
            }
        }, 1000);

        resendBtn.onclick = async () => {
            try {
                await sendEmailVerification(auth.currentUser);
                showToast("Verification email sent!");
                cooldown = 60;
            } catch(e) { showToast(e.message, 'error'); }
        };

        // Poll for verification status
        const poll = setInterval(async () => {
            await auth.currentUser.reload();
            if(auth.currentUser.emailVerified) {
                clearInterval(poll);
                clearInterval(timer);
                window.location.href = 'welcome.html';
            }
        }, 3000);
    </script>
</body>
</html>
