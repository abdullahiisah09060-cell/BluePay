<div class="container flex-center" style="height: 100vh;">
    <div class="auth-card" style="text-align: center;">
        <div style="font-size: 50px; color: var(--blue2); margin-bottom: 20px;"><i class="fa-solid fa-envelope-circle-check"></i></div>
        <h2>Verify Your Email</h2>
        <p>We sent a link to <b id="userEmail">...</b>. Click the link in your email to continue.</p>
        
        <div class="loader-container" style="margin: 30px 0;">
            <div class="spinner"></div>
            <p style="font-size: 12px; margin-top: 10px;">Waiting for verification...</p>
        </div>

        <button id="resend" class="btn-outline">Resend Email</button>
    </div>
</div>

<script type="module">
    import { auth } from './firebase-config.js';
    import { onAuthStateChanged, sendEmailVerification } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { toast } from './app.js';

    onAuthStateChanged(auth, user => {
        if (!user) return window.location.href = "login.html";
        document.getElementById("userEmail").innerText = user.email;

        // Polling loop
        const interval = setInterval(async () => {
            await user.reload();
            if (user.emailVerified) {
                clearInterval(interval);
                toast("Verified! Welcome aboard.", "success");
                window.location.href = "welcome.html";
            }
        }, 3000);
    });

    document.getElementById("resend").onclick = async () => {
        try {
            await sendEmailVerification(auth.currentUser);
            toast("New link sent!", "success");
        } catch(e) { toast(e.message, "error"); }
    };
</script>
