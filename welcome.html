<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome to BluePay 🎉</title>
  <link rel="stylesheet" href="global.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    .welcome-card {
      text-align: center; max-width: 500px; padding: 40px; z-index: 100;
    }
    .check-circle {
      width: 100px; height: 100px; background: var(--green); color: white;
      border-radius: 50%; font-size: 50px; display: flex; align-items: center;
      justify-content: center; margin: 0 auto 30px;
      animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    @keyframes popIn { 0% { transform: scale(0); } 100% { transform: scale(1); } }
  </style>
</head>
<body data-page="welcome" style="overflow: hidden;">
  <div id="global-loader"><div class="spinner"></div></div>
  
  <div class="auth-container">
    <div class="welcome-card reveal">
      <div class="check-circle"><i class="fa-solid fa-check"></i></div>
      <h1 id="welcome-title" style="margin-bottom: 16px; font-size: 28px;">Welcome to BluePay!</h1>
      <p style="color: var(--muted2); margin-bottom: 40px; font-size: 16px;">Your portfolio is ready. We've credited your wallet with your signup bonus.</p>
      
      <div style="background: rgba(26,86,219,0.1); border: 1px solid var(--borderb); padding: 30px; border-radius: var(--radius); margin-bottom: 40px;">
        <span style="display: block; font-size: 13px; color: var(--muted2); font-weight: 700; text-transform: uppercase; margin-bottom: 10px;">Welcome Bonus Credited</span>
        <h2 id="welcome-bonus" class="grad-text" style="font-size: 48px;">₦0</h2>
      </div>

      <button id="go-dash-btn" class="btn btn-primary" style="width: 100%; padding: 18px;">Go to Dashboard</button>
      <p id="welcome-countdown" style="margin-top: 20px; font-size: 12px; color: var(--muted);">Redirecting in 5s...</p>
    </div>
  </div>

  <script src="auth.js" type="module"></script>
</body>
</html>
