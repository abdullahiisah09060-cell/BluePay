<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Welcome to BluePay!</title>
    <link rel="stylesheet" href="global.css">
    <style>
        @keyframes celebrate {
            0% { transform: scale(0.8); opacity: 0; }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
        .celebrate-box { animation: celebrate 0.8s ease-out forwards; }
    </style>
</head>
<body class="flex-center" style="min-height: 100vh; padding: var(--space-4); background: radial-gradient(circle at center, #0f1422 0%, #06080f 100%);">
    <div class="card celebrate-box" style="width: 100%; max-width: 440px; text-align: center; padding: var(--space-10);">
        <div style="font-size: 4rem; margin-bottom: var(--space-4);">🎉</div>
        <h1 class="text-h1" style="margin-bottom: var(--space-2);">Welcome aboard!</h1>
        <p class="text-body" style="margin-bottom: var(--space-8);">Your account is ready. As a welcome gift, we've credited your wallet with:</p>
        
        <div style="background: var(--bg3); border: 2px dashed var(--gold); border-radius: var(--radius); padding: var(--space-6); margin-bottom: var(--space-8);">
            <div class="text-micro" style="color: var(--gold);">WELCOME BONUS</div>
            <div style="font-size: 2.5rem; font-weight: 800; color: white;">₦500.00</div>
        </div>

        <a href="dashboard.html" class="btn btn-gold" style="width: 100%;">Go to Dashboard</a>
    </div>
</body>
</html>
