<div class="container flex-center" style="height: 100vh; text-align: center;">
    <div class="reveal">
        <h1 class="grad-text">Congratulations! 🎉</h1>
        <p>Your premium BluePay account is now active.</p>
        
        <div class="bonus-reveal" style="margin: var(--space-12) 0;">
            <p style="font-size: 14px; font-weight: 700; color: var(--muted);">YOUR SIGNUP STATUS</p>
            <h2 id="naira" style="font-size: 48px; color: var(--green);">₦0</h2>
        </div>

        <a href="dashboard.html" class="btn-primary" style="padding: 18px 60px;">Enter Dashboard</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script type="module">
    import { initGuard } from './app.js';
    initGuard();

    // Confetti
    confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#1a56db', '#d4af37'] });

    // Naira Animation
    let count = 0;
    const target = 200000; // Bonus placeholder visual
    const timer = setInterval(() => {
        count += 5000;
        document.getElementById("naira").innerText = "₦" + count.toLocaleString();
        if (count >= target) clearInterval(timer);
    }, 30);
</script>
