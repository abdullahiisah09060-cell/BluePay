<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Withdraw Funds | BluePay</title>
    <link rel="stylesheet" href="global.css">
</head>
<body>
    <div id="app-layout">
        <main id="main-content" class="container" style="padding-top: var(--space-8);">
            <div class="card" style="max-width: 500px; margin: 0 auto;">
                <h2 class="text-h2">Request Withdrawal</h2>
                <p class="text-body" style="margin-bottom: var(--space-8);">Enter bank details and your purchased code</p>
                
                <form id="withdraw-form">
                    <div class="form-group">
                        <label class="label">Amount to Withdraw (₦)</label>
                        <input type="number" id="w-amount" class="input" placeholder="Enter amount" required>
                    </div>

                    <div class="grid-2">
                        <div class="form-group">
                            <label class="label">Bank Name</label>
                            <input type="text" id="w-bank" class="input" placeholder="e.g. Kuda Bank" required>
                        </div>
                        <div class="form-group">
                            <label class="label">Account Number</label>
                            <input type="text" id="w-account" class="input" placeholder="10 digits" maxlength="10" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="label">Account Name</label>
                        <input type="text" id="w-name" class="input" placeholder="Enter full account name" required>
                    </div>

                    <div class="form-group">
                        <label class="label">Withdrawal Code (WDC-XXXXXXXXXX)</label>
                        <input type="text" id="w-code" class="input" placeholder="Paste your purchased code" required>
                    </div>

                    <div class="card" style="background: var(--bg3); padding: var(--space-4); margin-bottom: 24px;">
                        <p class="text-small" style="color: var(--muted2);">Processing Time: 1-24 Hours</p>
                        <p class="text-small" style="color: var(--muted2);">Fee: ₦0.00</p>
                    </div>

                    <button type="submit" id="submit-btn" class="btn btn-primary" style="width: 100%;">Submit Request</button>
                </form>
            </div>
        </main>
    </div>

    <script type="module">
        import { requireAuth, db, formatNaira, updateBalance, createTransaction } from './firebase-config.js';
        import { doc, getDoc, updateDoc, serverTimestamp, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { showToast } from './components.js';

        document.getElementById('withdraw-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const codeVal = document.getElementById('w-code').value.trim();
            const amount = Number(document.getElementById('w-amount').value);

            btn.disabled = true;
            btn.innerText = "Processing...";

            try {
                // 1. Verify Code
                const codeDoc = await getDoc(doc(db, "codes", codeVal));
                if(!codeDoc.exists()) throw new Error("Invalid withdrawal code");
                const codeData = codeDoc.data();
                if(codeData.used) throw new Error("This code has already been used");
                if(new Date(codeData.expiresAt) < new Date()) throw new Error("This code has expired");
                if(codeData.uid !== auth.currentUser.uid) throw new Error("This code belongs to another user");

                // 2. Verify Balance
                const userDoc = await getDoc(doc(db, "users", auth.currentUser.uid));
                if(userDoc.data().balance < amount) throw new Error("Insufficient balance");

                // 3. Process
                const wId = `WD-${Date.now()}`;
                await setDoc(doc(db, "withdrawals", wId), {
                    uid: auth.currentUser.uid,
                    amount,
                    bankName: document.getElementById('w-bank').value,
                    accountNumber: document.getElementById('w-account').value,
                    accountName: document.getElementById('w-name').value,
                    code: codeVal,
                    status: "pending",
                    createdAt: serverTimestamp()
                });

                // Mark code used
                await updateDoc(doc(db, "codes", codeVal), { used: true, usedAt: serverTimestamp() });
                
                // Debit balance
                await updateBalance(auth.currentUser.uid, amount, 'sub');

                await createTransaction({
                    uid: auth.currentUser.uid,
                    type: "withdrawal",
                    amount,
                    description: `Withdrawal to ${document.getElementById('w-bank').value}`,
                    status: "pending"
                });

                showToast("Withdrawal request submitted!");
                setTimeout(() => window.location.href = 'dashboard.html', 2000);

            } catch(err) {
                showToast(err.message, "error");
                btn.disabled = false;
                btn.innerText = "Submit Request";
            }
        };
    </script>
</body>
</html>
